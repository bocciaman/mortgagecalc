{{ define "main" }}
<div class="page-hero">
  <h1>{{ .Title }}</h1>
  {{ with .Description }}<p>{{ . }}</p>{{ end }}
</div>

<div class="contact-wrap">
  <p>Have a question, found a bug, or want to suggest a new calculator? We'd love to hear from you.</p>

  <form name="contact" method="POST" data-netlify="true" netlify-honeypot="bot-field" class="contact-form">
    <input type="hidden" name="form-name" value="contact">
    <p class="hidden"><label>Don't fill this out: <input name="bot-field"></label></p>

    <div class="field">
      <label for="name">Your Name</label>
      <div class="input-wrap">
        <input type="text" id="name" name="name" required placeholder="Jane Smith">
      </div>
    </div>

    <div class="field">
      <label for="email">Email Address</label>
      <div class="input-wrap">
        <input type="email" id="email" name="email" required placeholder="jane@example.com">
      </div>
    </div>

    <div class="field">
      <label for="subject">Subject</label>
      <div class="input-wrap">
        <select id="subject" name="subject">
          <option value="question">General Question</option>
          <option value="bug">Report a Bug</option>
          <option value="suggestion">Feature Suggestion</option>
          <option value="other">Other</option>
        </select>
      </div>
    </div>

    <div class="field">
      <label for="message">Message</label>
      <div class="input-wrap">
        <textarea id="message" name="message" rows="6" required placeholder="Your message here..."></textarea>
      </div>
    </div>

    <div class="btn-row">
      <button type="submit" class="btn btn-primary">Send Message</button>
    </div>
  </form>

  <p class="contact-note">We typically respond within 1–2 business days.</p>
</div>
{{ end }}

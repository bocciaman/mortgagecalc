<div class="calc-card">
  <div class="calc-grid">

    <div class="field">
      <label for="mc-price">Home Price</label>
      <div class="input-wrap has-prefix">
        <span class="prefix">$</span>
        <input type="number" id="mc-price" value="400000" min="10000" step="1000">
      </div>
    </div>

    <div class="field">
      <label for="mc-down">Down Payment</label>
      <div class="input-wrap has-suffix">
        <input type="number" id="mc-down" value="80000" min="0" step="1000">
        <span class="suffix" id="mc-down-pct">20%</span>
      </div>
    </div>

    <div class="field">
      <label for="mc-rate">Annual Interest Rate</label>
      <div class="input-wrap has-suffix">
        <input type="number" id="mc-rate" value="7.00" min="0.1" max="30" step="0.05">
        <span class="suffix">%</span>
      </div>
    </div>

    <div class="field">
      <label for="mc-term">Loan Term</label>
      <div class="input-wrap">
        <select id="mc-term">
          <option value="30">30 Years</option>
          <option value="20">20 Years</option>
          <option value="15">15 Years</option>
          <option value="10">10 Years</option>
        </select>
      </div>
    </div>

    <div class="field">
      <label for="mc-tax">Annual Property Tax</label>
      <div class="input-wrap has-prefix">
        <span class="prefix">$</span>
        <input type="number" id="mc-tax" value="4800" min="0" step="100">
      </div>
      <span class="hint">Optional — for PITI estimate</span>
    </div>

    <div class="field">
      <label for="mc-ins">Annual Home Insurance</label>
      <div class="input-wrap has-prefix">
        <span class="prefix">$</span>
        <input type="number" id="mc-ins" value="1200" min="0" step="100">
      </div>
      <span class="hint">Optional — for PITI estimate</span>
    </div>

    <div class="btn-row">
      <button class="btn btn-primary" onclick="calcMortgage()">Calculate Payment</button>
    </div>
  </div>

  <!-- Results -->
  <div class="results" id="mc-results">
    <div class="result-highlight">
      <div>
        <div class="big-number" id="mc-piti">$0</div>
        <div class="big-label">Estimated Monthly Payment (PITI)</div>
      </div>
      <div>
        <div class="big-number" id="mc-pi" style="font-size:1.5rem;color:#374151"></div>
        <div class="big-label" style="color:#6b7280">Principal & Interest only</div>
      </div>
    </div>

    <div class="result-grid">
      <div class="result-item">
        <div class="val" id="mc-loan-amt">—</div>
        <div class="lbl">Loan Amount</div>
      </div>
      <div class="result-item">
        <div class="val" id="mc-total-int">—</div>
        <div class="lbl">Total Interest</div>
      </div>
      <div class="result-item">
        <div class="val" id="mc-total-paid">—</div>
        <div class="lbl">Total Paid</div>
      </div>
      <div class="result-item">
        <div class="val" id="mc-payoff">—</div>
        <div class="lbl">Payoff Date</div>
      </div>
    </div>

    <!-- SVG Pie Chart -->
    <div class="piti-chart">
      <svg id="mc-pie" width="140" height="140" viewBox="0 0 140 140"></svg>
      <div class="piti-legend" id="mc-legend"></div>
    </div>
  </div>
</div>

<script>
(function() {
  // Update down payment % label
  const priceEl = document.getElementById('mc-price');
  const downEl  = document.getElementById('mc-down');
  const pctLbl  = document.getElementById('mc-down-pct');

  function updatePct() {
    const p = parseFloat(priceEl.value) || 0;
    const d = parseFloat(downEl.value)  || 0;
    pctLbl.textContent = p > 0 ? (d / p * 100).toFixed(1) + '%' : '0%';
  }
  priceEl.addEventListener('input', updatePct);
  downEl.addEventListener('input', updatePct);
  updatePct();

  window.calcMortgage = function() {
    const price = parseFloat(priceEl.value)  || 0;
    const down  = parseFloat(downEl.value)   || 0;
    const rate  = parseFloat(document.getElementById('mc-rate').value) || 0;
    const term  = parseInt(document.getElementById('mc-term').value)   || 30;
    const tax   = parseFloat(document.getElementById('mc-tax').value)  || 0;
    const ins   = parseFloat(document.getElementById('mc-ins').value)  || 0;

    const loan = price - down;
    if (loan <= 0 || rate <= 0) return;

    const monthlyRate = rate / 100 / 12;
    const n = term * 12;
    const pi = loan * (monthlyRate * Math.pow(1 + monthlyRate, n)) / (Math.pow(1 + monthlyRate, n) - 1);
    const monthlyTax = tax / 12;
    const monthlyIns = ins / 12;
    const piti = pi + monthlyTax + monthlyIns;
    const totalInterest = pi * n - loan;
    const totalPaid = piti * n;

    const payoffDate = new Date();
    payoffDate.setMonth(payoffDate.getMonth() + n);
    const payoffStr = payoffDate.toLocaleDateString('en-US', { month: 'short', year: 'numeric' });

    document.getElementById('mc-piti').textContent    = fmt(piti);
    document.getElementById('mc-pi').textContent      = fmt(pi) + ' P&I';
    document.getElementById('mc-loan-amt').textContent = fmt(loan);
    document.getElementById('mc-total-int').textContent = fmt(totalInterest);
    document.getElementById('mc-total-paid').textContent = fmt(totalPaid);
    document.getElementById('mc-payoff').textContent  = payoffStr;

    // Pie chart
    drawPie([
      { label: 'Principal & Interest', value: pi,          color: '#1a56db' },
      { label: 'Property Tax',         value: monthlyTax,  color: '#f59e0b' },
      { label: 'Home Insurance',       value: monthlyIns,  color: '#10b981' },
    ]);

    document.getElementById('mc-results').classList.add('visible');
  };

  function fmt(n) {
    return '$' + n.toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
  }

  function drawPie(slices) {
    const svg = document.getElementById('mc-pie');
    const legend = document.getElementById('mc-legend');
    svg.innerHTML = '';
    legend.innerHTML = '';
    const total = slices.reduce((s, sl) => s + sl.value, 0);
    if (total <= 0) return;

    const cx = 70, cy = 70, r = 65;
    let startAngle = -Math.PI / 2;

    slices.forEach(sl => {
      if (sl.value <= 0) return;
      const angle = (sl.value / total) * 2 * Math.PI;
      const endAngle = startAngle + angle;
      const x1 = cx + r * Math.cos(startAngle);
      const y1 = cy + r * Math.sin(startAngle);
      const x2 = cx + r * Math.cos(endAngle);
      const y2 = cy + r * Math.sin(endAngle);
      const large = angle > Math.PI ? 1 : 0;
      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      path.setAttribute('d', `M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${large},1 ${x2},${y2} Z`);
      path.setAttribute('fill', sl.color);
      svg.appendChild(path);
      startAngle = endAngle;

      const dot = document.createElement('div');
      dot.className = 'legend-item';
      dot.innerHTML = `<span class="legend-dot" style="background:${sl.color}"></span><span>${sl.label}: <strong>${fmt(sl.value)}</strong></span>`;
      legend.appendChild(dot);
    });
  }

  // Auto-calculate on load
  calcMortgage();
})();
</script>

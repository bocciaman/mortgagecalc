<div class="calc-card">
  <div class="calc-grid">

    <div class="field">
      <label for="af-income">Annual Household Income</label>
      <div class="input-wrap has-prefix">
        <span class="prefix">$</span>
        <input type="number" id="af-income" value="100000" min="10000" step="1000">
      </div>
    </div>

    <div class="field">
      <label for="af-debts">Monthly Debt Payments</label>
      <div class="input-wrap has-prefix">
        <span class="prefix">$</span>
        <input type="number" id="af-debts" value="500" min="0" step="50">
      </div>
      <span class="hint">Car, student loans, credit cards, etc.</span>
    </div>

    <div class="field">
      <label for="af-down">Down Payment</label>
      <div class="input-wrap has-prefix">
        <span class="prefix">$</span>
        <input type="number" id="af-down" value="60000" min="0" step="1000">
      </div>
    </div>

    <div class="field">
      <label for="af-rate">Interest Rate</label>
      <div class="input-wrap has-suffix">
        <input type="number" id="af-rate" value="7.00" min="0.1" max="30" step="0.05">
        <span class="suffix">%</span>
      </div>
    </div>

    <div class="field">
      <label for="af-term">Loan Term</label>
      <div class="input-wrap">
        <select id="af-term">
          <option value="30">30 Years</option>
          <option value="20">20 Years</option>
          <option value="15">15 Years</option>
          <option value="10">10 Years</option>
        </select>
      </div>
    </div>

    <div class="field">
      <label for="af-tax">Annual Property Tax Rate</label>
      <div class="input-wrap has-suffix">
        <input type="number" id="af-tax" value="1.20" min="0" max="5" step="0.05">
        <span class="suffix">%</span>
      </div>
      <span class="hint">Avg. ~1.1% nationally</span>
    </div>

    <div class="btn-row">
      <button class="btn btn-primary" onclick="calcAffordability()">Calculate Affordability</button>
    </div>
  </div>

  <div class="results" id="af-results">
    <div class="result-highlight">
      <div>
        <div class="big-number" id="af-max-price">$0</div>
        <div class="big-label">Maximum Home Price</div>
      </div>
      <div>
        <div class="big-number" id="af-monthly" style="font-size:1.5rem;color:#374151"></div>
        <div class="big-label" style="color:#6b7280">Est. Monthly Payment</div>
      </div>
    </div>

    <div class="result-grid">
      <div class="result-item">
        <div class="val" id="af-max-loan">—</div>
        <div class="lbl">Max Loan Amount</div>
      </div>
      <div class="result-item">
        <div class="val" id="af-front-end">—</div>
        <div class="lbl">Housing-to-Income Ratio</div>
      </div>
      <div class="result-item">
        <div class="val" id="af-back-end">—</div>
        <div class="lbl">Total Debt-to-Income Ratio</div>
      </div>
      <div class="result-item good">
        <div class="val" id="af-budget-label">—</div>
        <div class="lbl">Budget Status</div>
      </div>
    </div>

    <div class="seo-content" style="margin-top:1rem;">
      <p id="af-explanation"></p>
    </div>
  </div>
</div>

<script>
(function(){
  window.calcAffordability = function() {
    const income  = parseFloat(document.getElementById('af-income').value) || 0;
    const debts   = parseFloat(document.getElementById('af-debts').value)  || 0;
    const down    = parseFloat(document.getElementById('af-down').value)   || 0;
    const rate    = parseFloat(document.getElementById('af-rate').value)   || 0;
    const term    = parseInt(document.getElementById('af-term').value)     || 30;
    const taxRate = parseFloat(document.getElementById('af-tax').value)    || 0;

    if (income <= 0 || rate <= 0) return;

    const monthlyIncome = income / 12;
    const mr = rate / 100 / 12;
    const n  = term * 12;

    // 28% front-end rule: housing ≤ 28% of gross monthly income
    const maxHousing = monthlyIncome * 0.28;
    // 36% back-end rule: total debts ≤ 36% of gross monthly income
    const maxTotal   = monthlyIncome * 0.36;
    const maxHousingBackEnd = maxTotal - debts;
    const maxMonthlyHousing = Math.min(maxHousing, maxHousingBackEnd);

    // Reverse-solve for loan: monthly payment = loan * (mr*(1+mr)^n)/((1+mr)^n-1)
    // But maxMonthlyHousing includes tax: P&I = maxMonthlyHousing / (1 + taxRate/100/12 roughly)
    // Iterative approach: find home price where PITI ≤ maxMonthlyHousing
    function pitiForPrice(homePrice) {
      const loan = homePrice - down;
      if (loan <= 0) return 0;
      const pi = loan * (mr * Math.pow(1+mr,n)) / (Math.pow(1+mr,n)-1);
      const monthlyTax = homePrice * (taxRate / 100) / 12;
      return pi + monthlyTax;
    }

    // Binary search for max home price
    let lo = down, hi = income * 20;
    for (let i = 0; i < 50; i++) {
      const mid = (lo + hi) / 2;
      if (pitiForPrice(mid) <= maxMonthlyHousing) lo = mid; else hi = mid;
    }
    const maxHomePrice = lo;
    const maxLoan = Math.max(maxHomePrice - down, 0);
    const monthlyPayment = pitiForPrice(maxHomePrice);
    const frontEnd = (monthlyPayment / monthlyIncome * 100).toFixed(1);
    const backEnd  = ((monthlyPayment + debts) / monthlyIncome * 100).toFixed(1);

    const fmt = v => '$' + v.toLocaleString('en-US', {minimumFractionDigits:0, maximumFractionDigits:0});
    document.getElementById('af-max-price').textContent  = fmt(maxHomePrice);
    document.getElementById('af-monthly').textContent    = fmt(monthlyPayment) + '/mo';
    document.getElementById('af-max-loan').textContent   = fmt(maxLoan);
    document.getElementById('af-front-end').textContent  = frontEnd + '%';
    document.getElementById('af-back-end').textContent   = backEnd + '%';

    const backEndNum = parseFloat(backEnd);
    let status, explanation;
    if (backEndNum <= 28) {
      status = '✅ Conservative'; explanation = `Your debt-to-income ratio of ${backEnd}% is well below the 36% guideline, giving you a comfortable cushion for unexpected expenses.`;
    } else if (backEndNum <= 36) {
      status = '✅ Good'; explanation = `Your total DTI of ${backEnd}% falls within standard lending guidelines. Most lenders will approve loans at this level.`;
    } else if (backEndNum <= 43) {
      status = '⚠️ Stretched'; explanation = `At ${backEnd}% DTI, you may qualify but you'll have less budget flexibility. Consider paying down debts or saving a larger down payment.`;
    } else {
      status = '❌ High DTI'; explanation = `A DTI of ${backEnd}% exceeds conventional guidelines. Reduce monthly debts or increase income before applying.`;
    }

    document.getElementById('af-budget-label').textContent = status;
    document.getElementById('af-explanation').textContent = explanation;
    document.getElementById('af-results').classList.add('visible');
  };

  calcAffordability();
})();
</script>
